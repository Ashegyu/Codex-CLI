<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';">
  <title>CLI Chat</title>
  <link rel="stylesheet" href="../node_modules/highlight.js/styles/github-dark-dimmed.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- 타이틀바 -->
  <header id="titlebar">
    <div id="titlebar-drag">
      <svg class="title-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
      <span class="title-text">CLI Chat</span>
    </div>
    <div id="titlebar-controls">
      <button class="tb-btn" id="btn-sidebar-toggle" title="사이드바 접기/펼치기" aria-label="사이드바 접기/펼치기">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1.2" y="1.2" width="9.6" height="9.6" rx="1.4"></rect>
          <line x1="4.4" y1="1.8" x2="4.4" y2="10.2"></line>
        </svg>
      </button>
      <button class="tb-btn" id="btn-codex-settings" title="Codex 설정" aria-label="Codex 설정">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 8.6 19a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 5 8.6a1.7 1.7 0 0 0-.34-1.87l-.06-.06A2 2 0 1 1 7.43 3.84l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3a2 2 0 1 1 4 0v.1A1.7 1.7 0 0 0 15.4 5a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.2.37.6.6 1 .6h.6a2 2 0 1 1 0 4h-.6a1.7 1.7 0 0 0-1 .4Z"></path>
        </svg>
      </button>
      <button class="tb-btn" id="btn-min" aria-label="창 최소화"><svg width="11" height="11" viewBox="0 0 11 11"><line x1="0" y1="5.5" x2="11" y2="5.5" stroke="currentColor" stroke-width="1"/></svg></button>
      <button class="tb-btn" id="btn-max" aria-label="창 최대화"><svg width="11" height="11" viewBox="0 0 11 11"><rect x="1" y="1" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1"/></svg></button>
      <button class="tb-btn tb-close" id="btn-close" aria-label="창 닫기"><svg width="11" height="11" viewBox="0 0 11 11"><line x1="1" y1="1" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="1" x2="1" y2="10" stroke="currentColor" stroke-width="1.2"/></svg></button>
    </div>
  </header>

  <div id="main">
    <!-- 사이드바 -->
    <aside id="sidebar">
      <div id="sidebar-top">
        <button id="btn-open-project" class="sidebar-btn primary-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            <line x1="12" y1="10" x2="12" y2="18"/>
            <line x1="8" y1="14" x2="16" y2="14"/>
          </svg>
          새 프로젝트
        </button>
      </div>

      <!-- 프로필 선택 -->
      <div id="profile-section">
        <div class="section-label">AI 프로필 (Codex)</div>
        <div id="profile-list"></div>
      </div>

      <!-- 프로젝트 목록 -->
      <div id="project-section">
        <div class="section-label">프로젝트 목록</div>
        <div id="project-list"></div>
      </div>

      <!-- 현재 프로젝트 -->
      <div id="cwd-section">
        <div class="section-label">선택된 프로젝트</div>
        <button id="btn-cwd" class="cwd-btn" title="프로젝트 열기/변경">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          <span id="cwd-path">프로젝트를 선택하세요</span>
        </button>
      </div>

      <!-- 사이드바 하단 -->
      <div id="sidebar-bottom">
        <button id="btn-clear-all" class="sidebar-btn muted-btn">대화 기록 삭제</button>
        <div class="sidebar-meta">
          <button id="btn-user-manual" class="sidebar-link-btn" type="button">사용 설명서</button>
          <div id="app-version" class="sidebar-version">버전 확인 중...</div>
        </div>
      </div>
    </aside>

    <div id="sidebar-resizer" role="separator" aria-orientation="vertical" aria-label="사이드바 너비 조절"></div>

    <!-- 채팅 영역 -->
    <section id="chat-area">
      <!-- 메시지 리스트 -->
      <div id="messages">
        <div id="welcome" class="welcome-screen">
          <div class="welcome-icon">
            <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <h2>CLI Chat</h2>
          <p>AI에게 무엇이든 물어보세요.<br>코드, 분석, 디버깅 — 모두 가능합니다.</p>
          <div class="welcome-hints">
            <button class="hint-chip" data-prompt="현재 디렉토리의 파일 구조를 분석해줘">파일 구조 분석</button>
            <button class="hint-chip" data-prompt="Python으로 간단한 웹 서버를 만드는 코드를 작성해줘">Python 웹 서버</button>
            <button class="hint-chip" data-prompt="Git 브랜치 전략에 대해 설명해줘">Git 브랜치 전략</button>
            <button class="hint-chip" data-prompt="이 코드를 리팩토링해줘: function add(a,b){return a+b}">코드 리팩토링</button>
          </div>
        </div>
      </div>
      <button id="btn-scroll-top" class="scroll-top-btn hidden" title="맨 위로 스크롤" aria-label="맨 위로 스크롤">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
      </button>

      <!-- 입력 영역 -->
      <div id="input-area">
        <div id="attachment-preview" class="hidden"></div>
        <div id="input-wrapper">
          <div id="active-profile-badge"></div>
          <button id="btn-attach" title="파일 첨부 (여러 파일 선택 가능)" aria-label="파일 첨부" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <button id="btn-commit" title="Git 커밋 (변경사항 커밋)" aria-label="Git 커밋" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="1.05" y1="12" x2="7" y2="12"/><line x1="17.01" y1="12" x2="22.96" y2="12"/></svg>
          </button>
          <textarea id="prompt-input" placeholder="질문을 입력하세요... (Enter로 전송, Shift+Enter로 줄바꿈)" rows="1"></textarea>
          <button id="btn-send" title="전송 (Enter)" aria-label="전송">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
          <button id="btn-stop" class="hidden" title="중지 (Esc)" aria-label="중지">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          </button>
        </div>
        <div id="slash-command-menu" class="hidden" role="listbox" aria-label="슬래시 명령어 목록"></div>
        <div id="session-picker" class="hidden" role="listbox" aria-label="세션 목록"></div>
        <div id="slash-command-feedback" class="hidden" aria-live="polite"></div>
        <div id="input-hint">
          <span id="current-profile-name"></span>
          <span class="sep">·</span>
          <span id="input-cwd-display" class="cwd-hint" title="작업 폴더 변경"></span>
          <span class="sep">·</span>
          <button id="current-model-name" class="runtime-hint runtime-select-btn" type="button"></button>
          <span class="sep">·</span>
          <button id="current-plan-mode" class="runtime-hint runtime-select-btn" type="button"></button>
          <span class="sep">·</span>
          <button id="current-sandbox-mode" class="runtime-hint runtime-select-btn" type="button"></button>
          <span class="sep">·</span>
          <button id="current-approval-policy" class="runtime-hint runtime-select-btn" type="button"></button>
          <span class="sep">·</span>
          <button id="context-compress-hint" class="runtime-hint runtime-select-btn" type="button" title="컨텍스트 압축 설정"></button>
          <span class="sep">·</span>
          <span>Enter 전송 · Shift+Enter 줄바꿈 · @파일경로 불러오기 · / 명령어 목록</span>
          <span class="sep">·</span>
          <button id="btn-subagent-autoclose" class="runtime-hint runtime-select-btn subagent-autoclose-btn" type="button" title="서브에이전트 완료 시 자동 닫기 설정">에이전트: 유지</button>
        </div>
        <div id="runtime-selector-menu" class="hidden" role="listbox" aria-label="런타임 설정 선택"></div>
        <div id="codex-statusbar" aria-live="polite"></div>
      </div>
    </section>
  </div>

  <!-- marked (UMD) - highlight.js는 preload에서 로드 -->
  <script src="../node_modules/marked/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
